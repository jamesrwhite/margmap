name: Fetch Data

on:
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Setup
        uses: ./.github/actions/setup

      - name: Fetch latest data
        run: pnpm fetch-data

      - name: Update README
        run: pnpm update-readme

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/ratings.csv src/data/ratings.json README.md
          git diff --cached --quiet || git commit -m "chore: fetch latest restaurant data"
          git push
