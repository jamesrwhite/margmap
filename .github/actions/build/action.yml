name: Build
description: Fetch latest data and build the site

runs:
  using: composite
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 25
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash

    - name: Fetch latest data
      run: pnpm fetch-data
      shell: bash

    - name: Build
      run: pnpm build
      shell: bash
