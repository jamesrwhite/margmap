<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MargMap</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>">
</head>

<body>
    <!-- Full-screen Map -->
    <div id="map"></div>

    <!-- Header Overlay -->
    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur shadow-sm border-b border-gray-200" style="z-index: 1000;">
        <div class="px-4 py-3 md:py-4 flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-gray-900">🍕 MargMap</h1>
            <button id="mobile-menu-toggle" class="lg:hidden text-gray-600 hover:text-gray-900">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="fixed inset-0 bg-black/50 lg:hidden hidden" style="z-index: 999;" onclick="if(event.target === this) document.getElementById('mobile-menu').classList.add('hidden');"></div>

    <!-- Mobile Filters Menu -->
    <div id="mobile-filters" class="fixed top-0 right-0 h-full w-full max-w-sm bg-white shadow-lg transform translate-x-full transition-transform duration-300 lg:hidden overflow-y-auto" style="z-index: 1001;">
        <div class="p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white">
            <h2 class="text-lg font-semibold text-gray-900">Filters</h2>
            <button id="close-mobile-menu" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        <div class="p-4 space-y-4">
            <div>
                <label for="search-input-mobile" class="block text-xs font-medium text-gray-700 mb-1">Search Restaurants</label>
                <input type="text" id="search-input-mobile" placeholder="Search by name..." class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="country-filter-mobile" class="block text-xs font-medium text-gray-700 mb-1">Country</label>
                <select id="country-filter-mobile" class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">All Countries</option>
                </select>
            </div>
            <div>
                <label for="sort-by-mobile" class="block text-xs font-medium text-gray-700 mb-1">Sort by</label>
                <select id="sort-by-mobile" class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="rating-desc">Rating (High to Low)</option>
                    <option value="rating-asc">Rating (Low to High)</option>
                    <option value="date-desc">Date (Newest)</option>
                    <option value="date-asc">Date (Oldest)</option>
                    <option value="price-desc">Price (High to Low)</option>
                    <option value="price-asc">Price (Low to High)</option>
                </select>
            </div>
            <div>
                <label for="rating-min-mobile" class="block text-xs font-medium text-gray-700 mb-1">Minimum Rating</label>
                <div class="flex items-center space-x-2">
                    <input type="range" id="rating-min-mobile" min="0" max="10" value="0" step="0.1" class="flex-1">
                    <span class="text-xs text-gray-600" id="rating-display-mobile">0+</span>
                </div>
                <div class="flex justify-between text-xs text-gray-500 mt-1">
                    <span>0</span>
                    <span>10</span>
                </div>
            </div>
            <hr class="my-2">
            <div>
                <h3 class="text-sm font-semibold text-gray-900 mb-2">Restaurants</h3>
                <div id="restaurants-list-mobile" class="space-y-1 divide-y divide-gray-200">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>
    <!-- Desktop Sidebar -->
    <aside class="fixed bottom-0 left-0 right-0 lg:top-[60px] lg:right-0 lg:left-auto lg:bottom-0 lg:w-96 lg:flex hidden bg-white/95 backdrop-blur shadow-xl max-h-[60vh] lg:max-h-[calc(100vh-60px)] flex-col" style="z-index: 1000;">
        <!-- Main Content (Stats, Filters, List) -->
        <div id="sidebar-main-content" class="p-4 flex flex-col flex-1 overflow-hidden">
            <!-- Stats Cards -->
            <section class="grid grid-cols-2 gap-2 mb-4 flex-shrink-0">
                <article class="bg-white rounded-lg shadow p-3">
                    <h2 class="text-xs font-medium text-gray-600 uppercase">Total</h2>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="total-count">0</p>
                </article>
                <article class="bg-white rounded-lg shadow p-3">
                    <h2 class="text-xs font-medium text-gray-600 uppercase">Avg Rating</h2>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="avg-rating">0</p>
                </article>
                <article class="bg-white rounded-lg shadow p-3">
                    <h2 class="text-xs font-medium text-gray-600 uppercase">Top Rated</h2>
                    <p class="text-sm font-bold text-gray-900 mt-1" id="top-restaurant">-</p>
                </article>
                <article class="bg-white rounded-lg shadow p-3">
                    <h2 class="text-xs font-medium text-gray-600 uppercase">Countries</h2>
                    <p class="text-2xl font-bold text-gray-900 mt-1" id="country-count">0</p>
                </article>
            </section>

            <!-- Filters -->
            <section class="bg-white rounded-lg shadow p-3 mb-4 flex-shrink-0">
                <div class="space-y-2">
                    <div>
                        <label for="search-input" class="block text-xs font-medium text-gray-700 mb-1">Search Restaurants</label>
                        <input type="text" id="search-input" placeholder="Search by name..." class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="country-filter" class="block text-xs font-medium text-gray-700 mb-1">Country</label>
                        <select id="country-filter" class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">All Countries</option>
                        </select>
                    </div>
                    <div>
                        <label for="sort-by" class="block text-xs font-medium text-gray-700 mb-1">Sort by</label>
                        <select id="sort-by" class="w-full border border-gray-300 rounded-md px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="rating-desc">Rating (High to Low)</option>
                            <option value="rating-asc">Rating (Low to High)</option>
                            <option value="date-desc">Date (Newest)</option>
                            <option value="date-asc">Date (Oldest)</option>
                            <option value="price-desc">Price (High to Low)</option>
                            <option value="price-asc">Price (Low to High)</option>
                        </select>
                    </div>
                    <div>
                        <label for="rating-min" class="block text-xs font-medium text-gray-700 mb-1">Minimum Rating</label>
                        <div class="flex items-center space-x-2">
                            <input type="range" id="rating-min" min="0" max="10" value="0" step="0.1" class="flex-1">
                            <span class="text-xs text-gray-600" id="rating-display">0+</span>
                        </div>
                        <div class="flex justify-between text-xs text-gray-500 mt-1">
                            <span>0</span>
                            <span>10</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Restaurants List -->
            <section class="bg-white rounded-lg shadow overflow-hidden flex-1 flex flex-col min-h-0">
                <div class="overflow-y-auto flex-1">
                    <div id="restaurants-list" class="divide-y divide-gray-200">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </section>
        </div>

        <!-- Detail View (Full Sidebar) -->
        <div id="sidebar-detail-view" class="hidden h-full flex-col">
            <!-- Header with close button -->
            <div class="p-4 border-b border-gray-200 flex justify-between items-center flex-shrink-0">
                <h2 class="text-xl font-bold text-gray-900" id="sidebar-detail-name"></h2>
                <button id="close-sidebar-detail" class="text-gray-400 hover:text-gray-600 p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>

            <!-- Scrollable content -->
            <div class="flex-1 overflow-y-auto p-4">
                <!-- Key Info -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Rating</div>
                        <div class="text-3xl font-bold text-gray-900" id="sidebar-detail-rating"></div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Price</div>
                        <div class="text-3xl font-bold text-gray-900" id="sidebar-detail-price"></div>
                    </div>
                    <div class="col-span-2">
                        <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Location</div>
                        <a id="sidebar-detail-location" href="#" target="_blank" rel="noopener noreferrer" class="text-base font-medium text-blue-600 hover:text-blue-800 inline-flex items-center gap-1">
                            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                            </svg>
                            <span></span>
                        </a>
                    </div>
                    <div class="col-span-2">
                        <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Date Visited</div>
                        <div class="text-base font-medium text-gray-900" id="sidebar-detail-date"></div>
                    </div>
                </div>

                <!-- Detailed Ratings -->
                <div>
                    <h3 class="text-sm font-semibold text-gray-900 uppercase tracking-wide mb-3">Detailed Ratings</h3>
                    <div id="sidebar-detail-ratings" class="space-y-3">
                        <!-- Populated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Mobile Detail View (Below Map) -->
    <div id="mobile-detail-view" class="hidden lg:hidden fixed left-0 right-0 bg-white shadow-xl transition-transform duration-300" style="z-index: 1000; top: calc(50vh + 60px); bottom: 0; overflow-y: auto;">
        <!-- Header with close button -->
        <div class="p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 bg-white">
            <h2 class="text-xl font-bold text-gray-900" id="mobile-detail-name"></h2>
            <button id="close-mobile-detail" class="text-gray-400 hover:text-gray-600 p-1">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <!-- Content -->
        <div class="p-4">
            <!-- Key Info -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Rating</div>
                    <div class="text-3xl font-bold text-gray-900" id="mobile-detail-rating"></div>
                </div>
                <div>
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Price</div>
                    <div class="text-3xl font-bold text-gray-900" id="mobile-detail-price"></div>
                </div>
                <div class="col-span-2">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Location</div>
                    <a id="mobile-detail-location" href="#" target="_blank" rel="noopener noreferrer" class="text-base font-medium text-blue-600 hover:text-blue-800 inline-flex items-center gap-1">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span></span>
                    </a>
                </div>
                <div class="col-span-2">
                    <div class="text-xs text-gray-500 uppercase tracking-wide mb-1">Date Visited</div>
                    <div class="text-base font-medium text-gray-900" id="mobile-detail-date"></div>
                </div>
            </div>

            <!-- Detailed Ratings -->
            <div>
                <h3 class="text-sm font-semibold text-gray-900 uppercase tracking-wide mb-3">Detailed Ratings</h3>
                <div id="mobile-detail-ratings" class="space-y-3">
                    <!-- Populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
